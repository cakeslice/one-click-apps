captainVersion: 4
services:
    $$cap_appname:
        restart: unless-stopped
        environment:
            TZ: $$cap_time_zone
        volumes:
            - $$cap_appname-data:/data
        caproverExtra:
            containerHttpPort: '8008'
            dockerfileLines:
                - FROM matrixdotorg/synapse:$$cap_synapse_version
                - RUN mkdir /data/
                - ENV SYNAPSE_SERVER_NAME=$$cap_appname.$$cap_root_domain
                - ENV SYNAPSE_REPORT_STATS=$$cap_synapse_stats
                - RUN /start.py generate
                - RUN echo '\nserve_server_wellknown\072 true' >> /data/homeserver.yaml
                - RUN echo "\nenable_registration\072 $$cap_enable_registration \nenable_registration_without_verification\072 true" >> /data/homeserver.yaml
                - RUN echo "\nmax_upload_size\072 $$cap_max_upload_sizeM" >> /data/homeserver.yaml
                - RUN sed -i '/^server_name.*/a public_baseurl\o072 "https://$$cap_appname.$$cap_root_domain"' /data/homeserver.yaml
                - RUN sed -i 's/name\o072 sqlite3/name\o072 psycopg2/g' /data/homeserver.yaml
                - RUN sed -i '/^  name\o072 psycopg2$/a\  allow_unsafe_locale\o072 true' /data/homeserver.yaml
                - RUN sed -i 's/database\o072 .*homeserver\.db/database\o072 $$cap_db_name\n    user\o072 $$cap_db_user\n    password\o072 $$cap_db_password\n    host\o072 $$cap_db_host\n    port\o072 $$cap_db_port\n/g' /data/homeserver.yaml

caproverOneClickApp:
    variables:
        - id: '$$cap_synapse_version'
          label: Synapse Version
          defaultValue: 'v1.154.0'
          description: Check out their Docker page for the valid tags https://hub.docker.com/r/matrixdotorg/synapse/tags
          validRegex: '/^v[0-9]{1,}|latest$/'
        - id: '$$cap_time_zone'
          label: Time zone
          defaultValue: Europe/Berlin
          description: The time zone of your server https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
          validRegex: '/.{1,}/'
        - id: '$$cap_synapse_stats'
          label: Report stats
          defaultValue: 'no'
          description: 'Report stats'
          validRegex: '/^(yes|no)$/i'
        - id: '$$cap_enable_registration'
          label: Enable public registration
          defaultValue: 'false'
          description: >-
              Set this to true if you want EVERYONE to be able to register.
              It's recommended to set this to false and create users manually.
          validRegex: '/^(true|false)$/i'
        - id: '$$cap_max_upload_size'
          label: Max upload size
          defaultValue: '300'
          description: >-
              The maximum size of a file that can be uploaded, in megabytes.

              If you set this higher than 500, you will will also need to increase the nginx "client_max_body_size".
          validRegex: '/^[0-9]{1,}$/'
        - id: '$$cap_db_host'
          label: Database host
          description: Hostname or IP of your external PostgreSQL server.
          validRegex: '/.{1,}/'
        - id: '$$cap_db_port'
          label: Database port
          defaultValue: '5432'
          description: Port of your external PostgreSQL server.
          validRegex: '/^[0-9]{1,}$/'
        - id: '$$cap_db_name'
          label: Database name
          description: >-
              Name of the database on your external PostgreSQL server.

              For best results, use a database with LC_COLLATE 'C' and LC_CTYPE 'C'.
          validRegex: '/.{1,}/'
        - id: '$$cap_db_user'
          label: Database user
          description: User for your external PostgreSQL database.
          validRegex: '/.{1,}/'
        - id: '$$cap_db_password'
          label: Database password
          description: Password for your external PostgreSQL database user.
          validRegex: '/.{1,}/'
    instructions:
        start: >-
            Synapse is a Matrix protocol server that lets you host your own messaging service.
            Matrix federates with other servers so you can communicate across the entire network.

            Learn more: https://matrix.org/

            This variant is for advanced users who want to use a central PostgreSQL server.
            Have your DB ready before deploying — this app will not create a database for you.
        end: >-
            Almost done!

            1. Enable Force HTTPS in the CapRover web UI.
            2. Wait ~30 seconds, then visit https://$$cap_appname.$$cap_root_domain
               You should see "It works! Synapse is running".

            Your server name is: $$cap_appname.$$cap_root_domain
            Use this as your custom homeserver URL in any Matrix client.

            You'll also need a client like Element Web: https://app.element.io/


            Creating users (if registration is disabled):

            ```
            sudo docker exec -it $(sudo docker ps | grep -o srv-captain--$$cap_appname\..*) \
              register_new_matrix_user http://localhost:8008 -c /data/homeserver.yaml
            ```

            Config file location:
              `/var/lib/docker/volumes/srv-captain--$$cap_appname-data/_data/homeserver.yaml`

            After editing, click "Save & Update" to restart.

            Docs: https://matrix-org.github.io/synapse/latest/usage/configuration/config_documentation.html


            NOTE: If Synapse fails to start due to a database locale error,
            recreate your database with C locale:

            ```sql
            CREATE DATABASE $$cap_db_name LC_COLLATE 'C' LC_CTYPE 'C' ENCODING 'UTF8' TEMPLATE template0;
            ```

    displayName: Matrix Synapse - No Database
    isOfficial: true
    description: Server for the matrix protocol (external PostgreSQL)
    documentation: https://github.com/matrix-org/synapse/tree/develop/docker
